<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maximusz — FX Artist Portfolio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0f;
    color: #e8e6e1;
    min-height: 100vh;
    overflow: hidden;
  }

  /* === LOGIN PAGE === */
  .login-page {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(165deg, #0a0a0f 0%, #12121f 50%, #0d0d18 100%);
    position: relative;
  }

  .login-page::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(99,102,241,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(168,85,247,0.04) 0%, transparent 50%);
    animation: ambientShift 15s ease-in-out infinite;
  }

  @keyframes ambientShift {
    0%,100% { transform: translate(0,0); }
    50% { transform: translate(-3%,-2%); }
  }

  .login-card {
    position: relative;
    z-index: 2;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 48px 40px;
    width: 420px;
    max-width: 90vw;
    backdrop-filter: blur(20px);
  }

  .login-card .logo {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .login-card .logo span { color: #818cf8; }

  .login-card .subtitle {
    color: #6b7280;
    font-size: 13px;
    font-weight: 400;
    margin-bottom: 36px;
    letter-spacing: 0.3px;
  }

  .login-card label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: #9ca3af;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .login-card input {
    width: 100%;
    padding: 14px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: #e8e6e1;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .login-card input:focus {
    border-color: #818cf8;
  }

  .login-card input::placeholder { color: #4b5563; }

  .login-card button {
    width: 100%;
    margin-top: 24px;
    padding: 14px;
    background: linear-gradient(135deg, #6366f1, #7c3aed);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
    letter-spacing: 0.3px;
  }

  .login-card button:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(99,102,241,0.3);
  }

  .login-card .footer-note {
    margin-top: 24px;
    text-align: center;
    font-size: 11px;
    color: #4b5563;
  }

  .login-card .footer-note a { color: #818cf8; text-decoration: none; }

  .error-msg {
    color: #f87171;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  /* === PRANK SCREEN === */
  .prank-screen {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #ff0000;
    animation: bgFlash 0.15s infinite alternate;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  @keyframes bgFlash {
    0% { background: #ff0000; }
    25% { background: #ff6600; }
    50% { background: #ffff00; }
    75% { background: #00ff00; }
    100% { background: #ff00ff; }
  }

  .prank-screen .busted {
    font-family: 'Playfair Display', serif;
    font-size: clamp(40px, 12vw, 120px);
    font-weight: 700;
    color: white;
    text-shadow: 4px 4px 0 #000, -2px -2px 0 #000;
    text-align: center;
    animation: bustedPulse 0.3s infinite alternate;
    z-index: 10;
    line-height: 1.1;
  }

  @keyframes bustedPulse {
    from { transform: scale(1) rotate(-2deg); }
    to { transform: scale(1.08) rotate(2deg); }
  }

  .prank-screen .sub-text {
    font-size: clamp(16px, 4vw, 32px);
    color: white;
    text-shadow: 2px 2px 0 #000;
    margin-top: 16px;
    z-index: 10;
    text-align: center;
    font-weight: 600;
    animation: subBounce 0.5s infinite alternate;
  }

  @keyframes subBounce {
    from { transform: translateY(0); }
    to { transform: translateY(-10px); }
  }

  .confetti-piece {
    position: fixed;
    z-index: 8;
    pointer-events: none;
  }

  /* loading state */
  .login-card button.loading {
    pointer-events: none;
    opacity: 0.7;
  }
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div class="login-page" id="loginPage">
  <div class="login-card">
    <div class="logo">Maximusz<span>.</span>fx</div>
    <div class="subtitle">Private Portfolio &middot; Authorized Access Only</div>

    <label for="pw">Access Code</label>
    <input type="password" id="pw" placeholder="Enter portfolio access code" autocomplete="off">
    <div class="error-msg" id="errMsg">Invalid access code. Please try again.</div>

    <button id="enterBtn" onclick="handleLogin()">View Portfolio</button>

    <div class="footer-note">
      This portfolio contains confidential project work.<br>
      Access provided by <a href="#">Maximusz</a> &middot; FX Artist
    </div>
  </div>
</div>

<!-- PRANK SCREEN -->
<div class="prank-screen" id="prankScreen">
  <div class="busted">BUSTED</div>
  <div class="sub-text">Nice try, "recruiter" &nbsp;&#x1F921;</div>
</div>

<script>
const ACCESS_CODE = 'maxfx2026';
let attempts = 0;

function handleLogin() {
  const pw = document.getElementById('pw').value.trim();
  const btn = document.getElementById('enterBtn');

  if (!pw) return;

  // Accept any password for the prank, or use the code
  // We'll accept the specific code to trigger, wrong = error
  if (pw === ACCESS_CODE) {
    btn.textContent = 'Loading portfolio...';
    btn.classList.add('loading');
    // Short delay to sell it
    setTimeout(() => {
      unleashChaos();
    }, 1500);
  } else {
    attempts++;
    if (attempts >= 3) {
      // Let them in after 3 tries anyway lol
      btn.textContent = 'Verifying...';
      btn.classList.add('loading');
      setTimeout(() => unleashChaos(), 1200);
    } else {
      document.getElementById('errMsg').style.display = 'block';
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  }
}

// Enter key support
document.getElementById('pw').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleLogin();
});

function unleashChaos() {
  // Hide login
  document.getElementById('loginPage').style.display = 'none';
  // Show prank
  const prankScreen = document.getElementById('prankScreen');
  prankScreen.style.display = 'flex';

  // AIRHORN - maximum violence edition
  startAirhorn();
  // CONFETTI
  launchConfetti();

  // Vibrate if supported (mobile)
  if (navigator.vibrate) {
    // Vibrate pattern for 10 seconds
    const pattern = [];
    for (let i = 0; i < 40; i++) { pattern.push(200, 50); }
    navigator.vibrate(pattern);
  }
}

function startAirhorn() {
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioContext();

    // Resume context (needed for autoplay policies)
    ctx.resume();

    // Create a compressor to prevent clipping while staying LOUD
    const compressor = ctx.createDynamicsCompressor();
    compressor.threshold.setValueAtTime(-3, ctx.currentTime);
    compressor.knee.setValueAtTime(0, ctx.currentTime);
    compressor.ratio.setValueAtTime(1, ctx.currentTime);
    compressor.attack.setValueAtTime(0, ctx.currentTime);
    compressor.release.setValueAtTime(0.01, ctx.currentTime);
    compressor.connect(ctx.destination);

    // Master gain - CRANKED
    const masterGain = ctx.createGain();
    masterGain.gain.setValueAtTime(1.0, ctx.currentTime);
    masterGain.connect(compressor);

    // Airhorn frequencies - layered for maximum pain
    const frequencies = [
      { freq: 480, type: 'sawtooth', gain: 1.0 },
      { freq: 540, type: 'square', gain: 0.9 },
      { freq: 380, type: 'sawtooth', gain: 0.8 },
      { freq: 720, type: 'square', gain: 0.7 },
      { freq: 960, type: 'sawtooth', gain: 0.5 },
      { freq: 1200, type: 'square', gain: 0.4 },
      // Sub bass for chest rumble
      { freq: 120, type: 'sawtooth', gain: 0.9 },
      { freq: 240, type: 'square', gain: 0.8 },
    ];

    const duration = 8; // 8 seconds of airhorn

    frequencies.forEach(f => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = f.type;
      osc.frequency.setValueAtTime(f.freq, ctx.currentTime);

      // Slight detune for fatness
      osc.detune.setValueAtTime(Math.random() * 20 - 10, ctx.currentTime);

      // Wobble the frequency for that authentic airhorn warble
      const lfo = ctx.createOscillator();
      const lfoGain = ctx.createGain();
      lfo.frequency.setValueAtTime(6 + Math.random() * 4, ctx.currentTime);
      lfoGain.gain.setValueAtTime(15, ctx.currentTime);
      lfo.connect(lfoGain);
      lfoGain.connect(osc.frequency);
      lfo.start();

      gain.gain.setValueAtTime(f.gain, ctx.currentTime);

      osc.connect(gain);
      gain.connect(masterGain);

      osc.start();
      osc.stop(ctx.currentTime + duration);
      lfo.stop(ctx.currentTime + duration);
    });

    // Add white noise burst for attack transient
    const bufferSize = ctx.sampleRate * 0.3;
    const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * 0.5;
    }
    const noise = ctx.createBufferSource();
    noise.buffer = noiseBuffer;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.8, ctx.currentTime);
    noiseGain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    noise.connect(noiseGain);
    noiseGain.connect(masterGain);
    noise.start();

    // Repeat the airhorn blast
    setTimeout(() => {
      try { startAirhorn(); } catch(e) {}
    }, duration * 1000);

  } catch(e) {
    console.log('Audio failed:', e);
  }
}

function launchConfetti() {
  const colors = ['#ff0000','#ff6600','#ffff00','#00ff00','#00ccff','#ff00ff','#ffffff','#ff3399'];
  const shapes = ['square','circle','strip'];

  function createPiece() {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const shape = shapes[Math.floor(Math.random() * shapes.length)];
    const size = 8 + Math.random() * 14;

    el.style.backgroundColor = color;
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-20px';

    if (shape === 'circle') {
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      el.style.borderRadius = '50%';
    } else if (shape === 'strip') {
      el.style.width = (size * 0.4) + 'px';
      el.style.height = (size * 2) + 'px';
      el.style.borderRadius = '2px';
    } else {
      el.style.width = size + 'px';
      el.style.height = size + 'px';
    }

    document.body.appendChild(el);

    const fallDuration = 2000 + Math.random() * 3000;
    const swayAmount = (Math.random() - 0.5) * 200;
    const rotation = Math.random() * 720 - 360;

    el.animate([
      { transform: `translateY(0) translateX(0) rotate(0deg)`, opacity: 1 },
      { transform: `translateY(${window.innerHeight + 50}px) translateX(${swayAmount}px) rotate(${rotation}deg)`, opacity: 0.7 }
    ], {
      duration: fallDuration,
      easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
    }).onfinish = () => el.remove();
  }

  // Initial burst
  for (let i = 0; i < 80; i++) {
    setTimeout(() => createPiece(), Math.random() * 500);
  }

  // Continuous rain
  const confettiInterval = setInterval(() => {
    for (let i = 0; i < 15; i++) {
      createPiece();
    }
  }, 300);

  // Stop after 15 seconds
  setTimeout(() => clearInterval(confettiInterval), 15000);
}
</script>
</body>
</html>
